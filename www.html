<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Async Weather Tracker</title>
  <link rel="stylesheet" href="styling.css">
</head>
<body>

  <h1 class="main-title">🌤️ Async Weather Tracker</h1>

  <div class="container">

    <div class="weatherForm">
      <h3>Search City</h3>
      <form id="form">
        <input type="text" id="city" placeholder="Enter the city" required>
        <button type="submit">Search</button>
      </form>
      <h3>Search History</h3>
      <div class="historyBtn"></div>
    </div>

    <div class="info">
      <h3>Weather Info</h3>
      <div class="weather-details"></div>
    </div>

  </div>

  <div class="console-box">
    <h3>Console – Event Loop</h3>
    <div class="console-output"></div>
  </div>

  <script src="script01.js"></script>
</body>
</html>/
